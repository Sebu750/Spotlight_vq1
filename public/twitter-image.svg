<svg width="1200" height="600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0A0A0A;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1a1a;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="600" fill="url(#bg)"/>
  
  <!-- Accent border -->
  <rect x="20" y="20" width="1160" height="560" fill="none" stroke="#FF0066" stroke-width="4"/>
  
  <!-- Logo/Brand -->
  <text x="600" y="150" font-family="Arial, sans-serif" font-size="64" font-weight="900" fill="#FFFFFF" text-anchor="middle" letter-spacing="-2">
    SPOTLIGHT
  </text>
  <text x="600" y="220" font-family="Arial, sans-serif" font-size="48" font-weight="900" fill="#FF0066" text-anchor="middle">
    X ADORZIA
  </text>
  
  <!-- Divider -->
  <rect x="400" y="250" width="400" height="4" fill="#FF0066"/>
  
  <!-- Event info -->
  <text x="600" y="320" font-family="Arial, sans-serif" font-size="36" font-weight="700" fill="#FFFFFF" text-anchor="middle">
    Fall 2026 Fashion Competition
  </text>
  <text x="600" y="370" font-family="Arial, sans-serif" font-size="28" font-weight="400" fill="#FFFFFF" opacity="0.7" text-anchor="middle">
    Lahore, Pakistan
  </text>
  
  <!-- Prize -->
  <text x="600" y="440" font-family="Arial, sans-serif" font-size="32" font-weight="900" fill="#FF0066" text-anchor="middle">
    PKR 300,000 Cash Prize
  </text>
  
  <!-- CTA -->
  <text x="600" y="520" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#FFFFFF" text-anchor="middle" letter-spacing="2">
    APPLY NOW AT ADORZIA.COM
  </text>
</svg>
